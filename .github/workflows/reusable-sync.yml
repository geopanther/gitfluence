name: Gitfluence Sync

on:
  workflow_call:
    inputs:
      repo_path:
        description: "Root directory of the git working tree to sync"
        type: string
        default: "."
      dry_run:
        description: "Preview mode — no Confluence API calls"
        type: boolean
        default: false
      gitfluence_version:
        description: "gitfluence version to install (e.g. '0.1.0' or 'latest')"
        type: string
        default: "latest"
      runner:
        description: "Runner label (default: ubuntu-latest; GHE users can specify a custom runner)"
        type: string
        default: "ubuntu-latest"
      python_version:
        description: "Python version to use"
        type: string
        default: "3.12"
      extra_args:
        description: "Additional CLI arguments passed to gitfluence (e.g. '--skip-empty --beautify-folders')"
        type: string
        default: ""
    secrets:
      CONFLUENCE_PROD_HOST:
        required: true
      CONFLUENCE_PROD_TOKEN:
        required: true
      CONFLUENCE_INT_HOST:
        required: false
      CONFLUENCE_INT_TOKEN:
        required: false
      CONFLUENCE_SPACE:
        required: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    concurrency:
      group: gitfluence-sync-${{ github.repository }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install gitfluence
        run: |
          if [ "${{ inputs.gitfluence_version }}" = "latest" ]; then
            pip install gitfluence
          else
            pip install "gitfluence==${{ inputs.gitfluence_version }}"
          fi

      - name: Sync to Confluence
        env:
          CONFLUENCE_PROD_HOST: ${{ secrets.CONFLUENCE_PROD_HOST }}
          CONFLUENCE_PROD_TOKEN: ${{ secrets.CONFLUENCE_PROD_TOKEN }}
          CONFLUENCE_INT_HOST: ${{ secrets.CONFLUENCE_INT_HOST }}
          CONFLUENCE_INT_TOKEN: ${{ secrets.CONFLUENCE_INT_TOKEN }}
          CONFLUENCE_SPACE: ${{ secrets.CONFLUENCE_SPACE }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          gitfluence $DRY_RUN_FLAG ${{ inputs.extra_args }} ${{ inputs.repo_path }}
