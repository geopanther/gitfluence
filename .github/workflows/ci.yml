name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev,test]"

      - name: Install mdfluence (editable for test collection)
        run: |
          mdfluence_version=$(pip show mdfluence | awk '/^Version:/{print $2}')
          git clone --branch "v${mdfluence_version}" --depth 1 \
            https://github.com/geopanther/mdfluence.git /tmp/mdfluence
          pip install -e /tmp/mdfluence

      - name: Lint (black)
        run: black --check .

      - name: Lint (isort)
        run: isort --check .

      - name: Lint (pylint)
        run: pylint gitfluence

      - name: Test
        run: pytest
