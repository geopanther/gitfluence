name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: bmw-ubuntu-24.04-medium
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.26"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (black)
        run: uv run black --check .

      - name: Lint (isort)
        run: uv run isort --check .

      - name: Lint (pylint)
        run: uv run pylint sync2cf

      - name: Test
        run: uv run pytest -m ''
