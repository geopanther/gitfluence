default_stages: [pre-push]
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: revert-changelog-rc
        name: revert changelog rc headings
        entry: python scripts/revert_changelog_rc.py
        language: system
        files: CHANGELOG.md
        stages: [pre-commit]
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]
        args: [--rcfile=.pylintrc]
      - id: pytest
        name: pytest (unit tests)
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
      - id: gitfluence
        name: gitfluence
        entry: gitfluence
        language: system
        pass_filenames: false
        args: ["--dry-run", "."]
        always_run: true
        stages: [pre-push]
